{% extends "base.html" %}

{% block content %}
<h1>Customers</h1>
<a class="button" href="{{ url_for('add_customer') }}">+ Add Customer</a>

<table class="table">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
    </tr>
    {% for customer in customers %}
    <tr>
        <td>{{ customer.name }}</td>
        <td>{{ customer.email }}</td>
        <td>{{ customer.phone }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
