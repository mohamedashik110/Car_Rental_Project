{% extends 'base.html' %}
{% block content %}

<h1>Edit Payment</h1>

<form method="POST">

    <label>Booking:</label>
    <input type="text" value="#{{ payment.booking.id }} - {{ payment.booking.customer.name }} ({{ payment.booking.car.name }})" disabled>

    <label>Amount:</label>
    <input type="number" name="amount" value="{{ payment.amount }}" step="0.01" required>

    <label>Status:</label>
    <select name="status" required>
        <option value="Paid" {% if payment.status == 'Paid' %}selected{% endif %}>Paid</option>
        <option value="Pending" {% if payment.status == 'Pending' %}selected{% endif %}>Pending</option>
    </select>

    <label>Payment Date:</label>
    <input type="date" name="payment_date" value="{{ payment_date_value }}" required>

    <br><br>
    <button type="submit">Update Payment</button>
</form>

<br>
<a href="{{ url_for('payments') }}">Back to Payments</a>

{% endblock %}
