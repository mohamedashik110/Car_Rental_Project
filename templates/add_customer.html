{% extends "base.html" %}

{% block content %}
<h1>Add Customer</h1>

<form method="POST">
    <label>Name:</label>
    <input type="text" name="name" required><br><br>

    <label>Email:</label>
    <input type="email" name="email" required><br><br>

    <label>Phone:</label>
    <input type="text" name="phone" required><br><br>

    <button type="submit">Add Customer</button>
</form>
{% endblock %}
