{% extends "base.html" %}

{% block content %}
<h1>Returned Cars</h1>

<table class="table">
    <tr>
        <th>Booking ID</th>
        <th>Customer</th>
        <th>Car</th>
        <th>Start Date</th>
        <th>End Date</th>
    </tr>
    {% for booking in returned %}
    <tr>
        <td>{{ booking.id }}</td>
        <td>{{ booking.customer_name }}</td>
        <td>{{ booking.car_id }}</td>
        <td>{{ booking.start_date }}</td>
        <td>{{ booking.end_date }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
